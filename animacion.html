<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PCB System | Bienvenida</title>

  <style>
    :root{
      --pcb-azul:#193a6a;
      --pcb-azul-2:#244c86;
      --pcb-dorado:#d9b45b;
      --pcb-dorado-2:#f0d48a;
      --pcb-blanco:#f8f9fc;
      --pcb-texto:#eaf1ff;
      --pcb-sombra:0 20px 60px rgba(0,0,0,.35);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      min-height:100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      overflow:hidden;
      background:
        radial-gradient(circle at top, rgba(25,58,106,.4), transparent 40%),
        radial-gradient(circle at bottom left, rgba(217,180,91,.2), transparent 35%),
        linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--pcb-texto);
    }

    .bg-glow{
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,.12), transparent 25%),
        radial-gradient(circle at 50% 70%, rgba(255,215,120,.08), transparent 30%);
      filter: blur(10px);
    }

    .intro-card{
      position:relative;
      width:min(1100px, 94vw);
      min-height:680px;
      border:1px solid rgba(255,255,255,.16);
      border-radius:32px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      box-shadow:var(--pcb-sombra);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      overflow:hidden;
      display:grid;
      grid-template-columns: 1.1fr .9fr;
    }

    .left-panel{
      position:relative;
      padding:54px 44px 44px 54px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      z-index:2;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:28px;
    }

    .brand-mark{
      width:58px;
      height:58px;
      border-radius:50%;
      border:2px solid rgba(240,212,138,.7);
      background:linear-gradient(145deg, rgba(255,255,255,.25), rgba(255,255,255,.08));
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 10px 25px rgba(0,0,0,.2);
      overflow:hidden;
    }

    .brand-mark img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .brand-text h1{
      font-size:1.35rem;
      line-height:1.1;
      font-weight:800;
      color:#fff;
      letter-spacing:.2px;
    }

    .brand-text p{
      margin-top:5px;
      color:rgba(255,255,255,.78);
      font-size:.95rem;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      gap:8px;
      width:max-content;
      padding:10px 16px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      color:#f7e6b1;
      font-weight:700;
      margin-bottom:22px;
      box-shadow:0 8px 24px rgba(0,0,0,.14);
    }

    .title{
      font-size:clamp(2.3rem, 4.5vw, 4.2rem);
      line-height:1.02;
      font-weight:900;
      color:#fff;
      max-width:620px;
      text-shadow:0 6px 26px rgba(0,0,0,.25);
    }

    .subtitle{
      margin-top:18px;
      max-width:600px;
      font-size:1.08rem;
      line-height:1.7;
      color:rgba(255,255,255,.86);
    }

    .typing-wrap{
      margin-top:34px;
      min-height:88px;
      max-width:720px;
      display:flex;
      align-items:center;
      gap:18px;
      padding:20px 24px;
      border-radius:24px;
      background:linear-gradient(135deg, rgba(102,126,234,.4), rgba(118,75,162,.3));
      border:1px solid rgba(240,212,138,.28);
      box-shadow:0 20px 50px rgba(0,0,0,.2);
    }

    .typing-icon{
      width:54px;
      height:54px;
      border-radius:18px;
      background:linear-gradient(135deg, var(--pcb-dorado), var(--pcb-dorado-2));
      color:#17325f;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.4rem;
      font-weight:900;
      flex-shrink:0;
      box-shadow:0 10px 20px rgba(0,0,0,.22);
    }

    .typing-text{
      font-size:clamp(1.15rem, 2vw, 1.8rem);
      font-weight:800;
      color:#fff;
      letter-spacing:.2px;
      line-height:1.4;
    }

    .cursor{
      display:inline-block;
      width:3px;
      height:1.2em;
      background:#f7d57f;
      margin-left:8px;
      vertical-align:middle;
      animation:blink .9s infinite;
      border-radius:4px;
    }

    @keyframes blink{
      0%, 50%{opacity:1}
      51%, 100%{opacity:0}
    }

    .actions{
      margin-top:30px;
      display:flex;
      gap:16px;
      flex-wrap:wrap;
    }

    .btn{
      appearance:none;
      border:none;
      cursor:pointer;
      transition:.25s ease;
      text-decoration:none;
      font-weight:800;
      font-size:1rem;
      border-radius:999px;
      padding:16px 26px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btn-primary{
      background:linear-gradient(135deg, #f4c947, #e2b445);
      color:#17325f;
      box-shadow:0 15px 30px rgba(0,0,0,.18);
    }

    .btn-primary:hover{
      transform:translateY(-2px);
      filter:brightness(1.04);
    }

    .btn-secondary{
      background:rgba(255,255,255,.1);
      color:#fff;
      border:1px solid rgba(255,255,255,.18);
    }

    .btn-secondary:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,.14);
    }

    .right-panel{
      position:relative;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding:30px 24px 24px;
      overflow:hidden;
      z-index:2;
    }

    .character-glow{
      position:absolute;
      width:420px;
      height:420px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(245,214,134,.24), transparent 65%);
      bottom:70px;
      filter:blur(20px);
    }

    .character{
      position:relative;
      width:min(470px, 88%);
      animation:float 4.2s ease-in-out infinite;
      filter:drop-shadow(0 22px 38px rgba(0,0,0,.4));
      z-index:2;
      user-select:none;
      -webkit-user-drag:none;
    }

    @keyframes float{
      0%,100%{ transform:translateY(0px); }
      50%{ transform:translateY(-14px); }
    }

    .character img{
      width:100%;
      height:auto;
      display:block;
      object-fit:contain;
    }

    .bottom-bar{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:92px;
      background:linear-gradient(180deg, rgba(255,255,255,0), rgba(102,126,234,.24) 20%, rgba(118,75,162,.42));
      z-index:1;
    }

    .skip{
      position:absolute;
      top:24px;
      right:24px;
      z-index:5;
      background:rgba(255,255,255,.1);
      color:#fff;
      border:1px solid rgba(255,255,255,.18);
      border-radius:999px;
      padding:12px 18px;
      font-weight:800;
      cursor:pointer;
      transition:.25s ease;
      backdrop-filter: blur(8px);
    }

    .skip:hover{
      background:rgba(255,255,255,.16);
      transform:translateY(-2px);
    }

    .particles{
      position:absolute;
      inset:0;
      overflow:hidden;
      pointer-events:none;
      z-index:0;
    }

    .particles span{
      position:absolute;
      width:8px;
      height:8px;
      border-radius:50%;
      background:rgba(255,255,255,.24);
      box-shadow:0 0 14px rgba(255,255,255,.15);
      animation:rise linear infinite;
    }

    .particles span:nth-child(1){ left:8%;  bottom:-20px; animation-duration:13s; animation-delay:0s; }
    .particles span:nth-child(2){ left:18%; bottom:-30px; animation-duration:15s; animation-delay:1.2s; }
    .particles span:nth-child(3){ left:27%; bottom:-22px; animation-duration:12s; animation-delay:2.4s; }
    .particles span:nth-child(4){ left:40%; bottom:-18px; animation-duration:16s; animation-delay:.8s; }
    .particles span:nth-child(5){ left:58%; bottom:-20px; animation-duration:14s; animation-delay:1.8s; }
    .particles span:nth-child(6){ left:70%; bottom:-30px; animation-duration:17s; animation-delay:2.9s; }
    .particles span:nth-child(7){ left:83%; bottom:-26px; animation-duration:13s; animation-delay:1.1s; }
    .particles span:nth-child(8){ left:92%; bottom:-24px; animation-duration:15s; animation-delay:2.1s; }

    @keyframes rise{
      0%{
        transform:translateY(0) scale(1);
        opacity:0;
      }
      10%{ opacity:1; }
      85%{ opacity:.8; }
      100%{
        transform:translateY(-110vh) scale(1.9);
        opacity:0;
      }
    }

    @media (max-width: 920px){
      .intro-card{
        grid-template-columns:1fr;
        min-height:auto;
      }

      .left-panel{
        padding:38px 26px 18px;
        text-align:center;
        align-items:center;
      }

      .brand{
        justify-content:center;
      }

      .title,
      .subtitle{
        max-width:100%;
      }

      .typing-wrap{
        width:100%;
      }

      .right-panel{
        padding:0 22px 26px;
      }

      .character{
        width:min(360px, 78%);
      }

      .character-glow{
        width:300px;
        height:300px;
        bottom:30px;
      }

      .skip{
        top:16px;
        right:16px;
      }
    }

    @media (max-width: 560px){
      .title{
        font-size:2.1rem;
      }

      .subtitle{
        font-size:.98rem;
      }

      .typing-wrap{
        padding:16px 16px;
        gap:12px;
        min-height:78px;
      }

      .typing-icon{
        width:46px;
        height:46px;
        border-radius:14px;
      }

      .typing-text{
        font-size:1.05rem;
      }

      .actions{
        width:100%;
        flex-direction:column;
      }

      .btn{
        width:100%;
      }

      .brand-mark{
        width:50px;
        height:50px;
      }

      .brand-text h1{
        font-size:1.05rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="particles">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>

  <button class="skip" id="skipIntro">Omitir</button>

  <main class="intro-card">
    <section class="left-panel">
      <div class="brand">
        <div class="brand-mark">
          <img src="LOGO6.png" alt="Logo PCB">
        </div>
        <div class="brand-text">
          <h1>Escuela Superior Vocacional</h1>
          <p>Pablo Colón Berdecia</p>
        </div>
      </div>

      <div class="tag">✨ Plataforma institucional oficial</div>

      <h2 class="title">PCB System</h2>

      <p class="subtitle">
        Plataforma digital diseñada para presentar la identidad, servicios y visión
        académica de la Escuela Superior Vocacional Pablo Colón Berdecia.
      </p>

      <div class="typing-wrap">
        <div class="typing-icon">🎓</div>
        <div class="typing-text">
          <span id="typedText"></span><span class="cursor"></span>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="enterNow">Entrar ahora</button>
        <button class="btn btn-secondary" id="waitBtn">Ver presentación</button>
      </div>
    </section>

    <section class="right-panel">
      <div class="character-glow"></div>
      <div class="character">
        <img src="imagePablo.png" alt="Personaje PCB System">
      </div>
      <div class="bottom-bar"></div>
    </section>
  </main>

  <script>
    const message = "Bienvenidos al PCB System";
    const typedText = document.getElementById("typedText");
    const skipIntro = document.getElementById("skipIntro");
    const enterNow = document.getElementById("enterNow");
    const waitBtn = document.getElementById("waitBtn");

    let index = 0;
    let typingFinished = false;
    let redirectTimeout;

    function typeMessage() {
      if (index < message.length) {
        typedText.textContent += message.charAt(index);
        index++;
        setTimeout(typeMessage, 65);
      } else {
        typingFinished = true;
        startAutoRedirect();
      }
    }

    function goToHome() {
      window.location.href = "index.html";
    }

    function startAutoRedirect() {
      clearTimeout(redirectTimeout);
      redirectTimeout = setTimeout(() => {
        goToHome();
      }, 2200);
    }

    skipIntro.addEventListener("click", goToHome);
    enterNow.addEventListener("click", goToHome);

    waitBtn.addEventListener("click", () => {
      if (!typingFinished) return;
      clearTimeout(redirectTimeout);
      setTimeout(() => {
        startAutoRedirect();
      }, 2500);
    });

    window.addEventListener("load", () => {
      typeMessage();
    });
  </script>
</body>
</html>
